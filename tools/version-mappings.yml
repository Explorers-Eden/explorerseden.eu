# Minecraft version mappings — the single place to update when a new MC release drops.
#
# Referenced by:
#   tools/scripts/fetch-configurator-pack-data.js  (data_pack_formats + resource_pack_formats)
#   tools/scripts/fetch-resource-pack-data.js      (resource_pack_formats)
#   tools/scripts/download-vanilla-assets.js       (latest)
#   tools/scripts/generate-entity-renders.js       (latest)
#
# The client-side fallback in assets/scripts/data-pack-configurator.js is kept in sync
# automatically: the CI scripts write packFormatToVersion into pack-data.json, which the
# client reads at runtime. Update the client PACK_FORMAT_FALLBACK only if the first-deploy
# fallback matters for a new version.

# Absolute fallback version when no release_infos.yml is found in a repo
latest: '26.2'

